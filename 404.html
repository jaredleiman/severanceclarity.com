<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — SeveranceClarity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black: #0a0a0a; --dark: #111118; --muted: #6b6b88; --fog: #a0a0bc; --white: #f8f8fc; --red: #e63946; --display: 'Bebas Neue', sans-serif; --sans: 'DM Sans', system-ui, sans-serif; }
    body { background: var(--dark); color: var(--fog); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
    .num { font-family: var(--display); font-size: 12rem; letter-spacing: 0.04em; color: rgba(255,255,255,0.04); line-height: 1; margin-bottom: -20px; }
    h1 { font-family: var(--display); font-size: 3rem; letter-spacing: 0.04em; color: var(--white); margin-bottom: 16px; }
    p { font-size: 16px; font-weight: 300; color: var(--muted); margin-bottom: 40px; }
    a { display: inline-block; background: var(--red); color: var(--white); font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; padding: 16px 36px; }
    a:hover { background: #c42d3a; }
  </style>
</head>
<body>
  <div class="num">404</div>
  <h1>PAGE NOT FOUND</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <a href="index.html">Back to Home</a>
</body>
</html>
